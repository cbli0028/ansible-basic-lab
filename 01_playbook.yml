---
- name: Linting Playbook
  hosts: copenhagen
  become: true

  tasks:
  - name: Test
    ansible.builtin.file:
      path: /root/testfile.txt
      state: touch
      mode: '0755'

  - name: Add line in file
    ansible.builtin.lineinfile:
      path: /root/testfile.txt
      line: Ansible was here...
      state: absent
      #become_user: root
